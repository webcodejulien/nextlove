<div style="font-family:sans-serif;max-width:480px;margin:0 auto;background:#0F0520;color:#fff;border-radius:16px;padding:32px">
  <div style="text-align:center;margin-bottom:24px">
    <div style="display:inline-block;background:linear-gradient(135deg,#FF6B9D,#9B59B6);border-radius:50%;width:60px;height:60px;line-height:60px;font-size:28px">✉️</div>
    <h1 style="color:#FF6B9D;font-size:24px;margin:16px 0 4px">Changement d'email</h1>
  </div>
  <p style="color:#C8A0E8;line-height:1.6;text-align:center">
    Confirmez votre nouvelle adresse email pour finaliser le changement.
  </p>
  <div style="text-align:center;margin:32px 0">
    <a href="{{ .ConfirmationURL }}" 
       style="display:inline-block;background:linear-gradient(135deg,#FF6B9D,#9B59B6);color:white;
              padding:14px 32px;border-radius:12px;text-decoration:none;font-weight:700;font-size:16px">
      Confirmer le changement
    </a>
  </div>
  <p style="color:#8060A0;font-size:12px;text-align:center">
    Si vous n'avez pas demandé ce changement, ignorez cet email.
  </p>
</div>
