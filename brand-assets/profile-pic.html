<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:800px; background:#0a0118; font-family:'SF Pro Display',system-ui,sans-serif; overflow:hidden; }

.wrap {
  width:800px; height:800px;
  background: radial-gradient(ellipse at 30% 30%, #2d0a4e 0%, #1a0535 40%, #0a0118 100%);
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  position:relative; overflow:hidden;
}

/* Orbes */
.orb1 {
  position:absolute; width:400px; height:400px; border-radius:50%;
  background: radial-gradient(circle, rgba(255,107,157,0.18) 0%, transparent 70%);
  top:-80px; right:-80px;
}
.orb2 {
  position:absolute; width:300px; height:300px; border-radius:50%;
  background: radial-gradient(circle, rgba(155,89,182,0.15) 0%, transparent 70%);
  bottom:-60px; left:-60px;
}

/* Cercle principal */
.circle {
  width:460px; height:460px; border-radius:50%;
  background: linear-gradient(135deg, rgba(255,107,157,0.12) 0%, rgba(155,89,182,0.12) 100%);
  border: 2px solid rgba(255,107,157,0.25);
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  position:relative;
  box-shadow: 0 0 80px rgba(255,107,157,0.12), inset 0 0 60px rgba(155,89,182,0.06);
}

/* Anneau extérieur */
.ring {
  position:absolute; inset:-18px; border-radius:50%;
  border: 1px solid rgba(255,107,157,0.15);
}
.ring2 {
  position:absolute; inset:-36px; border-radius:50%;
  border: 1px solid rgba(155,89,182,0.08);
}

/* Coeur SVG */
.heart-wrap {
  margin-bottom: 18px;
  filter: drop-shadow(0 0 28px rgba(255,107,157,0.7)) drop-shadow(0 0 60px rgba(255,107,157,0.35));
}

/* Texte */
.brand-name {
  font-size: 72px;
  font-weight: 900;
  letter-spacing: -2px;
  background: linear-gradient(135deg, #FF6B9D 0%, #C850C0 50%, #9B59B6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

/* Sparkles */
.spark { position:absolute; border-radius:50%; background:#FF8FB5; }
.s1 { width:6px;height:6px; top:120px; right:130px; box-shadow:0 0 10px #FF6B9D; }
.s2 { width:4px;height:4px; top:180px; left:110px; box-shadow:0 0 8px #B47FCA; }
.s3 { width:5px;height:5px; bottom:150px; right:120px; background:#B47FCA; box-shadow:0 0 8px #9B59B6; }
.s4 { width:3px;height:3px; bottom:200px; left:140px; box-shadow:0 0 6px #FF6B9D; }
.s5 { width:7px;height:7px; top:90px; left:200px; box-shadow:0 0 12px #FF6B9D; }
</style>
</head>
<body>
<div class="wrap">
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="spark s1"></div>
  <div class="spark s2"></div>
  <div class="spark s3"></div>
  <div class="spark s4"></div>
  <div class="spark s5"></div>
  <div class="circle">
    <div class="ring"></div>
    <div class="ring2"></div>
    <div class="heart-wrap">
      <svg width="180" height="170" viewBox="0 0 90 85" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hg" x1="0" y1="0" x2="90" y2="85" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FF6B9D"/>
            <stop offset="50%" stop-color="#C850C0"/>
            <stop offset="100%" stop-color="#9B59B6"/>
          </linearGradient>
        </defs>
        <path d="M45 74s-29-19.5-29-39A16.5 16.5 0 0 1 45 22a16.5 16.5 0 0 1 29 13c0 19.5-29 39-29 39z" fill="url(#hg)"/>
        <path d="M63 10 l2 5.2 5.2 2-5.2 2L63 24.4l-2-5.2-5.2-2 5.2-2z" fill="#FF8FB5" opacity="0.9"/>
        <path d="M22 58 l1.2 3.2 3.2 1.2-3.2 1.2L22 66.8l-1.2-3.2-3.2-1.2 3.2-1.2z" fill="#C0A0DC" opacity="0.8"/>
      </svg>
    </div>
    <div class="brand-name">NextLove</div>
  </div>
</div>
</body>
</html>
